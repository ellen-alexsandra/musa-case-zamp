<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musa × Zamp — Relatório Anual 2025–2026</title>
<meta name="description" content="Um ano de gestão digitalizada. Três marcas. 804 lojas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --o:     #FFBA86;
  --o-dim: rgba(255,186,134,0.22);
  --o-txt: #B5733A;
  --dk:    #232323;
  --dk2:   #1c1c1c;
  --lt:    #ffffff;
  --cr:    #f5f2ed;
  --serif: 'Playfair Display', Georgia, serif;
  --sans:  'Inter', -apple-system, Arial, sans-serif;
}

html, body {
  width: 100%;
  min-height: 100vh;
  font-family: var(--sans);
  background: #161616;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

/* ── DECK ─────────────────────────────────────── */
.deck {
  width: 100%;
  max-width: 1000px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}

/* ── PROGRESS BAR ─────────────────────────────── */
.pbar-track { height: 3px; background: #111; }
.pbar { height: 3px; background: var(--o); width: 9.09%; transition: width 0.4s ease; }

/* ── SLIDES CONTAINER — fixed 16:9 ratio ──────── */
.slides-wrap {
  position: relative;
  width: 100%;
  /* 16:9 aspect ratio */
  padding-bottom: 56.25%;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 5% 7%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.slide.on { opacity: 1; pointer-events: all; }

.s-dk { background: var(--dk); }
.s-lt { background: var(--lt); }
.s-cr { background: var(--cr); }

/* ── COUNTER ──────────────────────────────────── */
.cnt {
  position: absolute;
  top: 4%;
  right: 3%;
  font-size: clamp(9px, 1vw, 11px);
  letter-spacing: 1.5px;
  font-family: var(--sans);
}
.s-dk .cnt { color: rgba(255,255,255,0.2); }
.s-lt .cnt, .s-cr .cnt { color: rgba(0,0,0,0.18); }

/* ── EYEBROW ──────────────────────────────────── */
.ey {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: clamp(10px, 2%, 20px);
  font-size: clamp(8px, 0.95vw, 11px);
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-family: var(--sans);
}
.ey-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.ey-line { width: 28px; height: 1px; }
.s-dk .ey       { color: var(--o); }
.s-dk .ey-dot   { background: var(--o); }
.s-dk .ey-line  { background: rgba(255,186,134,0.28); }
.s-lt .ey, .s-cr .ey      { color: var(--o-txt); }
.s-lt .ey-dot, .s-cr .ey-dot { background: var(--o-txt); }
.s-lt .ey-line, .s-cr .ey-line { background: rgba(181,115,58,0.22); }

/* ── TYPOGRAPHY ───────────────────────────────── */
.h1 {
  font-family: var(--serif);
  font-size: clamp(22px, 3.6vw, 40px);
  font-weight: 700;
  line-height: 1.13;
  margin-bottom: clamp(8px, 1.5%, 18px);
  color: #fff;
}
.h1 em { font-style: italic; color: #686868; }

.h2 {
  font-family: var(--serif);
  font-size: clamp(20px, 3.2vw, 36px);
  font-weight: 700;
  line-height: 1.14;
  margin-bottom: clamp(8px, 1.2%, 14px);
  color: #1a1a1a;
}

.bd {
  font-size: clamp(11px, 1.2vw, 14px);
  line-height: 1.72;
  max-width: 52%;
  font-weight: 400;
}
.s-dk .bd { color: #9a9a9a; }
.s-lt .bd, .s-cr .bd { color: #606060; }

/* ── COVER ────────────────────────────────────── */
.logos {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: clamp(20px, 5%, 48px);
}
.lm   { font-family: var(--sans); font-size: clamp(14px, 1.7vw, 20px); font-weight: 600; color: #fff; }
.lsep { color: #444; font-size: clamp(16px, 2vw, 22px); }
.lz   {
  font-size: clamp(9px, 1.1vw, 13px);
  font-weight: 700;
  letter-spacing: 2.5px;
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.25);
  padding: 3px 10px;
  border-radius: 4px;
  text-transform: uppercase;
}

.pill {
  display: inline-flex;
  border: 1px solid rgba(255,186,134,0.55);
  color: var(--o);
  font-size: clamp(8px, 0.85vw, 10px);
  font-weight: 600;
  letter-spacing: 2.5px;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: clamp(12px, 2.5%, 28px);
  text-transform: uppercase;
  font-family: var(--sans);
  width: fit-content;
}

/* ── METRIC GRID ──────────────────────────────── */
.mgrid { display: flex; gap: 10px; margin-top: clamp(10px, 2%, 24px); flex-wrap: wrap; }
.mc   { flex: 1; min-width: 100px; border-radius: 8px; padding: clamp(10px, 1.8%, 20px); }
.mc-d { background: rgba(255,255,255,0.07); }
.mc-l { background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.mc-c { background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
.mv   { font-family: var(--sans); font-size: clamp(20px, 2.8vw, 32px); font-weight: 600; line-height: 1; margin-bottom: 5px; }
.mv-o  { color: var(--o); }
.mv-dk { color: #1a1a1a; }
.mv-bl { color: #6FB3F5; }
.ml { font-size: clamp(7px, 0.8vw, 9px); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #999; line-height: 1.4; font-family: var(--sans); }
.ms { font-size: clamp(8px, 0.9vw, 10px); color: #777; margin-top: 3px; line-height: 1.4; }

/* ── BRAND ROWS ───────────────────────────────── */
.blist { display: flex; flex-direction: column; gap: 8px; margin-top: clamp(12px, 2%, 24px); }
.brow {
  background: rgba(255,255,255,0.065);
  border-radius: 8px;
  padding: clamp(8px, 1.2%, 14px) clamp(12px, 1.8%, 22px);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.bn { font-size: clamp(11px, 1.2vw, 14px); font-weight: 500; color: #c8c8c8; }
.bv { font-size: clamp(16px, 1.9vw, 22px); font-weight: 600; color: #fff; }
.bu { font-size: clamp(7px, 0.8vw, 9px); letter-spacing: 1.5px; text-transform: uppercase; color: var(--o); margin-left: 5px; font-weight: 500; }

/* ── TAGS ─────────────────────────────────────── */
.tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: clamp(8px, 1.5%, 16px); }
.tag  { border: 1px solid #383838; color: #888; font-size: clamp(8px, 0.85vw, 10px); padding: 3px 10px; border-radius: 20px; }

/* ── HERO NUMBER ──────────────────────────────── */
.hero {
  font-family: var(--serif);
  font-size: clamp(56px, 9.5vw, 108px);
  font-weight: 700;
  color: var(--o);
  line-height: 1;
  margin-bottom: clamp(10px, 1.8%, 18px);
}

/* ── COMPARE BOX ──────────────────────────────── */
.cmpbox { display: inline-flex; background: rgba(255,255,255,0.075); border-radius: 10px; overflow: hidden; margin-top: clamp(10px, 1.8%, 20px); }
.cmps   { padding: clamp(8px, 1.2%, 14px) clamp(20px, 3%, 36px); text-align: center; }
.cmpsep { width: 1px; background: rgba(255,255,255,0.08); }
.cv-g { font-size: clamp(14px, 1.7vw, 20px); font-weight: 600; color: var(--o); margin-bottom: 4px; }
.cv-b { font-size: clamp(14px, 1.7vw, 20px); font-weight: 600; color: #505050; margin-bottom: 4px; }
.cl   { font-size: clamp(7px, 0.8vw, 9px); letter-spacing: 1.5px; text-transform: uppercase; color: #666; font-family: var(--sans); }

/* ── IMPACT GRID ──────────────────────────────── */
.igrid { display: flex; gap: 10px; margin-top: clamp(10px, 1.8%, 22px); }
.ic    { flex: 1; background: rgba(255,255,255,0.065); border-radius: 8px; padding: clamp(10px, 1.6%, 18px); }
.iv    { font-size: clamp(18px, 2.2vw, 26px); font-weight: 600; color: var(--o); margin-bottom: 4px; }
.il    { font-size: clamp(7px, 0.8vw, 9px); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #888; line-height: 1.4; }
.is    { font-size: clamp(8px, 0.85vw, 10px); color: #555; margin-top: 4px; line-height: 1.5; }

/* ── TIERS ────────────────────────────────────── */
.tgrid { display: flex; gap: 10px; margin-top: clamp(10px, 1.8%, 20px); }
.tc    { flex: 1; border-radius: 8px; padding: clamp(10px, 1.5%, 17px); }
.t-top { background: rgba(255,186,134,0.1); border: 1px solid rgba(255,186,134,0.2); }
.t-mid { background: rgba(255,255,255,0.055); }
.t-bot { background: rgba(255,255,255,0.03); }
.tl    { font-size: clamp(7px, 0.8vw, 9px); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; font-family: var(--sans); }
.tl-o  { color: var(--o); } .tl-g { color: #888; } .tl-d { color: #555; }
.tn    { font-size: clamp(20px, 2.5vw, 28px); font-weight: 600; line-height: 1; margin-bottom: 6px; }
.ts    { font-size: clamp(8px, 0.9vw, 10px); color: #777; line-height: 1.6; }

/* ── STATE GRID ───────────────────────────────── */
.sgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: clamp(10px, 1.8%, 20px); }
.srow  { border-radius: 6px; padding: clamp(6px, 1%, 9px) clamp(10px, 1.4%, 16px); display: flex; justify-content: space-between; align-items: center; }
.s-dk .srow { background: rgba(255,255,255,0.055); }
.s-cr .srow { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.s-dk .sn   { font-size: clamp(9px, 1vw, 11px); font-weight: 500; color: #c0c0c0; letter-spacing: 0.5px; }
.s-cr .sn   { font-size: clamp(9px, 1vw, 11px); font-weight: 500; color: #1a1a1a; letter-spacing: 0.5px; }
.s-dk .sv   { font-size: clamp(11px, 1.2vw, 13px); font-weight: 600; color: var(--o); }
.s-cr .sv   { font-size: clamp(11px, 1.2vw, 13px); font-weight: 600; color: var(--o-txt); }
.su         { font-size: clamp(7px, 0.75vw, 9px); margin-left: 3px; opacity: 0.6; }

/* ── CHART ────────────────────────────────────── */
.chart-wrap {
  background: #fff;
  border-radius: 8px;
  padding: clamp(10px, 1.6%, 18px);
  margin-top: clamp(10px, 1.8%, 18px);
  border: 0.5px solid #ececec;
  width: 100%;
}
.chart-lbl    { font-size: clamp(7px, 0.8vw, 9px); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #c0c0c0; margin-bottom: 10px; }
.chart-months { display: flex; justify-content: space-between; margin-top: 6px; padding: 0 2px; }
.chart-months span { font-size: clamp(6px, 0.75vw, 8px); color: #c0c0c0; }

/* ── CTA ──────────────────────────────────────── */
.cta-card {
  background: #1a1a1a;
  border-radius: 10px;
  padding: clamp(14px, 2.2%, 28px) clamp(18px, 3%, 36px);
  margin-top: clamp(10px, 1.8%, 20px);
  width: fit-content;
  min-width: 320px;
}
.cta-name    { font-size: clamp(12px, 1.4vw, 16px); font-weight: 600; color: #fff; margin-bottom: 2px; }
.cta-role    { font-size: clamp(9px, 1vw, 11px); color: #555; margin-bottom: clamp(8px, 1.4%, 16px); }
.cta-contact { font-size: clamp(10px, 1.1vw, 13px); color: var(--o); line-height: 2; }
.cta-contact a { color: var(--o); text-decoration: none; }
.cta-tagline {
  font-family: var(--serif);
  font-size: clamp(9px, 1vw, 12px);
  font-style: italic;
  color: #3a3a3a;
  margin-top: clamp(8px, 1.2%, 16px);
  padding-top: clamp(8px, 1.2%, 14px);
  border-top: 0.5px solid #2a2a2a;
}

/* ── NAVIGATION ───────────────────────────────── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--dk2);
  border-top: 0.5px solid #2a2a2a;
}
.nb {
  background: transparent;
  border: 1px solid #3c3c3c;
  color: #c0c0c0;
  font-size: clamp(10px, 1vw, 12px);
  font-weight: 500;
  padding: 7px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--sans);
  letter-spacing: 0.3px;
  transition: border-color 0.15s, color 0.15s;
}
.nb:hover             { border-color: var(--o); color: var(--o); }
.nb:disabled          { opacity: 0.25; cursor: default; }
.nb:disabled:hover    { border-color: #3c3c3c; color: #c0c0c0; }

.drow { display: flex; gap: 6px; align-items: center; }
.dot  { width: 6px; height: 6px; border-radius: 50%; background: #383838; cursor: pointer; transition: all 0.22s ease; }
.dot.on     { background: var(--o); width: 20px; border-radius: 3px; }
.dot:hover:not(.on) { background: #666; }
</style>
</head>
<body>

<div class="deck">
  <div class="pbar-track"><div class="pbar" id="pb"></div></div>
  <div class="slides-wrap" id="sc"></div>
  <nav class="nav">
    <button class="nb" id="pvb" onclick="go(cur-1)" disabled>← Anterior</button>
    <div class="drow" id="dr"></div>

  </nav>
</div>

let cur = 0;
const N = SL.length;

function build() {
  const sc = document.getElementById('sc');
  const dr = document.getElementById('dr');
  SL.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'slide ' + s.c + (i === 0 ? ' on' : '');
    el.id = 's' + i;
    el.innerHTML = s.h + `<div class="cnt">${i + 1} / ${N}</div>`;
    sc.appendChild(el);
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.onclick = () => go(i);
    dr.appendChild(d);
  });
}

function go(n) {
  if (n < 0 || n >= N) return;
  document.getElementById('s' + cur).classList.remove('on');
  document.querySelectorAll('.dot')[cur].classList.remove('on');
  cur = n;
  document.getElementById('s' + cur).classList.add('on');
  document.querySelectorAll('.dot')[cur].classList.add('on');
  document.getElementById('pvb').disabled = cur === 0;
  document.getElementById('nxb').disabled = cur === N - 1;
  document.getElementById('pb').style.width = ((cur + 1) / N * 100) + '%';
}

build();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
});

let ts = 0;
document.addEventListener('touchstart', e => { ts = e.touches[0].clientX; });
document.addEventListener('touchend',   e => {
  const diff = ts - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) go(diff > 0 ? cur + 1 : cur - 1);
});
</script>
