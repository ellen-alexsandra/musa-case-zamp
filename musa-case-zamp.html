<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musa × Zamp — Relatório Anual 2025–2026</title>
<meta name="description" content="Um ano de gestão digitalizada. Três marcas. 804 lojas. Resíduo virou dado, dado virou decisão, e decisão virou resultado.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --o: #FFBA86;
    --o-dim: rgba(255,186,134,0.22);
    --o-text: #B5733A;
    --dk: #232323;
    --dk2: #1c1c1c;
    --lt: #ffffff;
    --cr: #f5f2ed;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Inter', -apple-system, Arial, sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: #181818;
    overflow: hidden;
  }

  /* ── DECK WRAPPER ─────────────────────────────── */
  .deck {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── PROGRESS BAR ─────────────────────────────── */
  .pbar-track { height: 3px; background: #111; flex-shrink: 0; }
  .pbar { height: 3px; background: var(--o); width: 9.09%; transition: width 0.4s ease; }

  /* ── SLIDE AREA ───────────────────────────────── */
  .slides-wrap { flex: 1; overflow: hidden; position: relative; }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 54px 72px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .slide.on { opacity: 1; pointer-events: all; }

  .s-dk  { background: var(--dk); }
  .s-lt  { background: var(--lt); }
  .s-cr  { background: var(--cr); }

  /* ── COUNTER ──────────────────────────────────── */
  .cnt {
    position: absolute;
    top: 20px; right: 28px;
    font-size: 10px;
    letter-spacing: 1.5px;
    font-family: var(--sans);
  }
  .s-dk .cnt { color: rgba(255,255,255,0.2); }
  .s-lt .cnt, .s-cr .cnt { color: rgba(0,0,0,0.18); }

  /* ── EYEBROW ──────────────────────────────────── */
  .ey {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 22px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-family: var(--sans);
  }
  .ey-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ey-line { width: 30px; height: 1px; }

  .s-dk .ey { color: var(--o); }
  .s-dk .ey-dot { background: var(--o); }
  .s-dk .ey-line { background: rgba(255,186,134,0.28); }

  .s-lt .ey, .s-cr .ey { color: var(--o-text); }
  .s-lt .ey-dot, .s-cr .ey-dot { background: var(--o-text); }
  .s-lt .ey-line, .s-cr .ey-line { background: rgba(181,115,58,0.22); }

  /* ── TYPOGRAPHY ───────────────────────────────── */
  .h1 {
    font-family: var(--serif);
    font-size: clamp(32px, 4vw, 44px);
    font-weight: 700;
    line-height: 1.12;
    margin-bottom: 18px;
    color: #fff;
  }
  .h1 em { font-style: italic; color: #6e6e6e; }

  .h2 {
    font-family: var(--serif);
    font-size: clamp(28px, 3.5vw, 38px);
    font-weight: 700;
    line-height: 1.14;
    margin-bottom: 14px;
    color: #1a1a1a;
  }

  .bd {
    font-size: clamp(13px, 1.3vw, 15px);
    line-height: 1.75;
    max-width: 500px;
    font-weight: 400;
  }
  .s-dk .bd { color: #9a9a9a; }
  .s-lt .bd, .s-cr .bd { color: #606060; }

  /* ── COVER LOGOS ──────────────────────────────── */
  .logos { display: flex; align-items: center; gap: 14px; margin-bottom: 50px; }
  .lm { font-family: var(--sans); font-size: 19px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .lsep { color: #444; font-size: 22px; }
  .lz { font-size: 12px; font-weight: 700; letter-spacing: 2.5px; color: #fff; border: 1.5px solid rgba(255,255,255,0.25); padding: 4px 13px; border-radius: 4px; text-transform: uppercase; }

  .pill {
    display: inline-flex;
    border: 1px solid rgba(255,186,134,0.55);
    color: var(--o);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2.5px;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 30px;
    text-transform: uppercase;
    font-family: var(--sans);
  }

  /* ── METRIC GRID ──────────────────────────────── */
  .mgrid { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
  .mc { flex: 1; min-width: 130px; border-radius: 10px; padding: 20px 22px; }
  .mc-d { background: rgba(255,255,255,0.07); }
  .mc-l { background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
  .mc-c { background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }

  .mv { font-family: var(--sans); font-size: 32px; font-weight: 600; line-height: 1; margin-bottom: 7px; }
  .mv-o  { color: var(--o); }
  .mv-dk { color: #1a1a1a; }
  .mv-bl { color: #6FB3F5; }
  .ml { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #999; line-height: 1.4; font-family: var(--sans); }
  .ms { font-size: 10px; color: #777; margin-top: 4px; line-height: 1.45; }

  /* ── BRAND ROWS ───────────────────────────────── */
  .blist { display: flex; flex-direction: column; gap: 10px; margin-top: 28px; }
  .brow {
    background: rgba(255,255,255,0.065);
    border-radius: 9px;
    padding: 14px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bn { font-size: 14px; font-weight: 500; color: #c8c8c8; }
  .bv { font-size: 22px; font-weight: 600; color: #fff; }
  .bu { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--o); margin-left: 6px; font-weight: 500; }

  /* ── TAGS ─────────────────────────────────────── */
  .tags { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 18px; }
  .tag { border: 1px solid #383838; color: #888; font-size: 10px; padding: 4px 12px; border-radius: 20px; }

  /* ── HERO NUMBER ──────────────────────────────── */
  .hero { font-family: var(--serif); font-size: clamp(72px, 10vw, 112px); font-weight: 700; color: var(--o); line-height: 1; margin-bottom: 18px; }

  /* ── COMPARE BOX ──────────────────────────────── */
  .cmpbox { display: inline-flex; background: rgba(255,255,255,0.075); border-radius: 10px; overflow: hidden; margin-top: 22px; }
  .cmps { padding: 14px 36px; text-align: center; }
  .cmpsep { width: 1px; background: rgba(255,255,255,0.08); }
  .cv-g { font-size: 20px; font-weight: 600; color: var(--o); margin-bottom: 5px; }
  .cv-b { font-size: 20px; font-weight: 600; color: #505050; margin-bottom: 5px; }
  .cl { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #666; font-family: var(--sans); }

  /* ── IMPACT GRID ──────────────────────────────── */
  .igrid { display: flex; gap: 12px; margin-top: 24px; }
  .ic { flex: 1; background: rgba(255,255,255,0.065); border-radius: 10px; padding: 18px 18px; }
  .iv { font-size: 26px; font-weight: 600; color: var(--o); margin-bottom: 5px; }
  .il { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #888; line-height: 1.4; }
  .is { font-size: 10px; color: #555; margin-top: 5px; line-height: 1.5; }

  /* ── TIERS ────────────────────────────────────── */
  .tgrid { display: flex; gap: 10px; margin-top: 22px; }
  .tc { flex: 1; border-radius: 10px; padding: 17px 18px; }
  .t-top { background: rgba(255,186,134,0.1); border: 1px solid rgba(255,186,134,0.2); }
  .t-mid { background: rgba(255,255,255,0.055); }
  .t-bot { background: rgba(255,255,255,0.03); }
  .tl { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; font-family: var(--sans); }
  .tl-o { color: var(--o); } .tl-g { color: #888; } .tl-d { color: #555; }
  .tn { font-size: 30px; font-weight: 600; line-height: 1; margin-bottom: 7px; }
  .ts { font-size: 10px; color: #777; line-height: 1.6; }

  /* ── STATE GRID ───────────────────────────────── */
  .sgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 22px; }
  .srow { border-radius: 6px; padding: 9px 16px; display: flex; justify-content: space-between; align-items: center; }
  .s-dk .srow  { background: rgba(255,255,255,0.055); }
  .s-cr .srow  { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .s-dk .sn    { font-size: 11px; font-weight: 500; color: #c0c0c0; letter-spacing: 0.5px; }
  .s-cr .sn    { font-size: 11px; font-weight: 500; color: #1a1a1a; letter-spacing: 0.5px; }
  .s-dk .sv    { font-size: 13px; font-weight: 600; color: var(--o); }
  .s-cr .sv    { font-size: 13px; font-weight: 600; color: var(--o-text); }
  .su { font-size: 9px; margin-left: 3px; opacity: 0.6; }

  /* ── CHART ────────────────────────────────────── */
  .chart-wrap {
    background: #fff;
    border-radius: 10px;
    padding: 18px 22px;
    margin-top: 20px;
    border: 0.5px solid #ececec;
  }
  .chart-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #c0c0c0; margin-bottom: 14px; }
  .chart-months { display: flex; justify-content: space-between; margin-top: 8px; padding: 0 2px; }
  .chart-months span { font-size: 8px; color: #c0c0c0; }

  /* ── CTA CARD ─────────────────────────────────── */
  .cta-card { background: #1a1a1a; border-radius: 12px; padding: 28px 36px; margin-top: 22px; }
  .cta-name { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 2px; }
  .cta-role { font-size: 11px; color: #555; margin-bottom: 18px; }
  .cta-contact { font-size: 13px; color: var(--o); line-height: 2.1; }
  .cta-contact a { color: var(--o); text-decoration: none; }
  .cta-tagline {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: #3a3a3a;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 0.5px solid #2a2a2a;
  }

  /* ── NAVIGATION ───────────────────────────────── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 28px;
    background: var(--dk2);
    border-top: 0.5px solid #2a2a2a;
    flex-shrink: 0;
  }
  .nb {
    background: transparent;
    border: 1px solid #3c3c3c;
    color: #c0c0c0;
    font-size: 11px;
    font-weight: 500;
    padding: 8px 22px;
    border-radius: 20px;
    cursor: pointer;
    font-family: var(--sans);
    letter-spacing: 0.3px;
    transition: border-color 0.15s, color 0.15s;
  }
  .nb:hover { border-color: var(--o); color: var(--o); }
  .nb:disabled { opacity: 0.25; cursor: default; }
  .nb:disabled:hover { border-color: #3c3c3c; color: #c0c0c0; }

  .drow { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #383838;
    cursor: pointer;
    transition: all 0.22s ease;
  }
  .dot.on { background: var(--o); width: 20px; border-radius: 3px; }
  .dot:hover:not(.on) { background: #666; }

  /* ── RESPONSIVE ───────────────────────────────── */
  @media (max-width: 680px) {
    .slide { padding: 36px 28px; }
    .mgrid { flex-direction: column; }
    .igrid { flex-direction: column; }
    .tgrid { flex-direction: column; }
    .sgrid { grid-template-columns: 1fr; }
    .brow { padding: 12px 16px; }
    .nav { padding: 10px 16px; }
    .nb { padding: 7px 14px; font-size: 11px; }
    .hero { font-size: 64px; }
    .cmpbox { flex-direction: column; }
    .cmpsep { width: 100%; height: 1px; }
  }
</style>
</head>
<body>

let cur = 0;
const N = SL.length;

function build() {
  const sc = document.getElementById('sc');
  const dr = document.getElementById('dr');

  SL.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'slide ' + s.c + (i === 0 ? ' on' : '');
    el.id = 's' + i;
    el.innerHTML = s.h + `<div class="cnt">${i + 1} / ${N}</div>`;
    sc.appendChild(el);

    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.onclick = () => go(i);
    dr.appendChild(d);
  });
}

function go(n) {
  if (n < 0 || n >= N) return;
  document.getElementById('s' + cur).classList.remove('on');
  document.querySelectorAll('.dot')[cur].classList.remove('on');
  cur = n;
  document.getElementById('s' + cur).classList.add('on');
  document.querySelectorAll('.dot')[cur].classList.add('on');
  document.getElementById('pvb').disabled = cur === 0;
  document.getElementById('nxb').disabled = cur === N - 1;
  document.getElementById('pb').style.width = ((cur + 1) / N * 100) + '%';
}

build();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
});

// Swipe support (mobile)
let ts = 0;
document.addEventListener('touchstart', e => { ts = e.touches[0].clientX; });
document.addEventListener('touchend',   e => {
  const diff = ts - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) go(diff > 0 ? cur + 1 : cur - 1);
});
</script>
